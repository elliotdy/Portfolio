<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Gallery | Mechanism Trash Can</title>
  <link rel="icon" type="image/svg+xml" href="Logo1.svg">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="projectBody">

<!-- NAV -->
<nav class="top-nav" data-back-href="trashcan.html" data-back-label="Trash Can"></nav>

<main class="universal-gallery-shell">
  <section class="universal-gallery-header">
    <p class="section-kicker">MECHANISM TRASH CAN</p>
    <h1>Full Gallery</h1>
    <p>Assembly views, linkage studies, design iterations, and motion validation.</p>
  </section>

  <section class="universal-gallery-grid" data-gallery="trashcan">

    <!-- IMAGES -->

    <article class="universal-gallery-item" data-type="image" data-src="images/trashCan/TrashCanAssembly.PNG" data-caption="Full assembly">
      <img src="images/trashCan/TrashCanAssembly.PNG" alt="Full assembly">
    </article>

    <article class="universal-gallery-item" data-type="image" data-src="images/trashCan/TrashCanFront.PNG" data-caption="Front view">
      <img src="images/trashCan/TrashCanFront.PNG" alt="Front view">
    </article>

    <article class="universal-gallery-item" data-type="image" data-src="images/trashCan/TrashcanLinkageIso.PNG" data-caption="Linkage isometric">
      <img src="images/trashCan/TrashcanLinkageIso.PNG" alt="Linkage iso">
    </article>

    <article class="universal-gallery-item" data-type="image" data-src="images/trashCan/TrashcanLinkageFront.PNG" data-caption="Linkage front view">
      <img src="images/trashCan/TrashcanLinkageFront.PNG" alt="Linkage front">
    </article>

    <article class="universal-gallery-item" data-type="image" data-src="images/trashCan/TrashcanLinkageSide.PNG" data-caption="Linkage side view">
      <img src="images/trashCan/TrashcanLinkageSide.PNG" alt="Linkage side">
    </article>

    <article class="universal-gallery-item" data-type="image" data-src="images/trashCan/TrashcanMathIllustrationsAssignment.png" data-caption="Initial math layout">
      <img src="images/trashCan/TrashcanMathIllustrationsAssignment.png" alt="Initial math">
    </article>

    <article class="universal-gallery-item" data-type="image" data-src="images/trashCan/TrashCanMathIllustrationsRefined.png" data-caption="Refined linkage design">
      <img src="images/trashCan/TrashCanMathIllustrationsRefined.png" alt="Refined math">
    </article>

    <!-- VIDEOS (MP4 ONLY) -->

    <article class="universal-gallery-item universal-gallery-video"
      data-type="video"
      data-src="images/trashCan/TrashCanAssemblyAngle.mp4"
      data-caption="Assembly motion angle view">

      <video muted playsinline preload="metadata">
        <source src="images/trashCan/TrashCanAssemblyAngle.mp4" type="video/mp4">
      </video>
    </article>

    <article class="universal-gallery-item universal-gallery-video"
      data-type="video"
      data-src="images/trashCan/TrashCanAssemblyside.mp4"
      data-caption="Side motion validation">

      <video muted playsinline preload="metadata">
        <source src="images/trashCan/TrashCanAssemblyside.mp4" type="video/mp4">
      </video>
    </article>

  </section>
</main>

<!-- LIGHTBOX -->
<div class="universal-lightbox" id="universalLightbox">
  <button class="universal-lightbox-close" id="universalLightboxClose">&times;</button>
  <button class="universal-lightbox-arrow universal-lightbox-prev" id="universalPrevBtn">&#10094;</button>

  <div class="universal-lightbox-content" id="universalLightboxContent">
    <p class="universal-lightbox-caption" id="universalLightboxCaption"></p>
  </div>

  <button class="universal-lightbox-arrow universal-lightbox-next" id="universalNextBtn">&#10095;</button>
</div>

<script src="components.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
